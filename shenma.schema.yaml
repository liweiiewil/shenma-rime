---
schema:
  schema_id: shenma
  name: 沈码
  version: "1.0"
  author:
    - User
  description: |
    神码输入法自定义方案
dependencies:
  - punct

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - reverse_lookup_translator

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz/"
  delimiter: " '"
  max_code_length: 4
  auto_select: true
  auto_select_pattern: "^[a-z/]{4}$"
  auto_select_unique_candidate: true
  algebra:
    - 'derive/^([a-z/]{0,3})\/$/$1a/'
    - 'derive/^([a-z/]{0,3})\/$/$1b/'
    - 'derive/^([a-z/]{0,3})\/$/$1c/'
    - 'derive/^([a-z/]{0,3})\/$/$1d/'
    - 'derive/^([a-z/]{0,3})\/$/$1e/'
    - 'derive/^([a-z/]{0,3})\/$/$1f/'
    - 'derive/^([a-z/]{0,3})\/$/$1g/'
    - 'derive/^([a-z/]{0,3})\/$/$1h/'
    - 'derive/^([a-z/]{0,3})\/$/$1i/'
    - 'derive/^([a-z/]{0,3})\/$/$1j/'
    - 'derive/^([a-z/]{0,3})\/$/$1k/'
    - 'derive/^([a-z/]{0,3})\/$/$1l/'
    - 'derive/^([a-z/]{0,3})\/$/$1m/'
    - 'derive/^([a-z/]{0,3})\/$/$1n/'
    - 'derive/^([a-z/]{0,3})\/$/$1o/'
    - 'derive/^([a-z/]{0,3})\/$/$1p/'
    - 'derive/^([a-z/]{0,3})\/$/$1q/'
    - 'derive/^([a-z/]{0,3})\/$/$1r/'
    - 'derive/^([a-z/]{0,3})\/$/$1s/'
    - 'derive/^([a-z/]{0,3})\/$/$1t/'
    - 'derive/^([a-z/]{0,3})\/$/$1u/'
    - 'derive/^([a-z/]{0,3})\/$/$1v/'
    - 'derive/^([a-z/]{0,3})\/$/$1w/'
    - 'derive/^([a-z/]{0,3})\/$/$1x/'
    - 'derive/^([a-z/]{0,3})\/$/$1y/'
    - 'derive/^([a-z/]{0,3})\/$/$1z/'

translator:
  dictionary: shenma
  enable_charset_filter: false
  enable_encoder: false
  enable_sentence: false 
  encode_commit_history: false

recognizer:
  import_preset: default
  patterns:
    punct: "^/.*$"
...
