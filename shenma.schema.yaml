---
schema:
  schema_id: shenma
  name: 神码
  version: "1.0"
  author:
    - User
  description: |
    神码输入法自定义方案
dependencies:
  - punct

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - reverse_lookup_translator

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz/"  # 1. 必须将 / 加入允许输入的字母表
  delimiter: " '"
  max_code_length: 4
  auto_select: true
  auto_select_pattern: "^[a-z/]{4}$"       # 2. 匹配规则加上 /，保证含万能键也能4码上屏
  auto_select_unique_candidate: true
  algebra:
    # --- 动态派生万能键规则 ---
    # 替换 1 码字
    - 'derive/^([a-z])$/\//'
    # 替换 2 码字
    - 'derive/^([a-z])([a-z])$/\/$2/'
    - 'derive/^([a-z])([a-z])$/$1\//'
    # 替换 3 码字
    - 'derive/^([a-z])([a-z])([a-z])$/\/$2$3/'
    - 'derive/^([a-z])([a-z])([a-z])$/$1\/$3/'
    - 'derive/^([a-z])([a-z])([a-z])$/$1$2\//'
    # 替换 4 码字
    - 'derive/^([a-z])([a-z])([a-z])([a-z])$/\/$2$3$4/'
    - 'derive/^([a-z])([a-z])([a-z])([a-z])$/$1\/$3$4/'
    - 'derive/^([a-z])([a-z])([a-z])([a-z])$/$1$2\/$4/'
    - 'derive/^([a-z])([a-z])([a-z])([a-z])$/$1$2$3\//'

translator:
  dictionary: shenma
  enable_charset_filter: false
  enable_encoder: false
  enable_sentence: false 
  encode_commit_history: false
...
