---
schema:
  schema_id: shenma
  name: 神码
  version: "1.1"
  author:
    - User
  description: |
    神码输入法自定义方案 - 恢复版
    使用 ` 作为万能键
dependencies:
  - punct

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - reverse_lookup_translator

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz`"
  delimiter: " '"
  max_code_length: 4
  auto_select: true
  auto_select_pattern: "^[a-z`]{4}$"
  auto_select_unique_candidate: true
  algebra:
    - derive/`/a/
    - derive/`/b/
    - derive/`/c/
    - derive/`/d/
    - derive/`/e/
    - derive/`/f/
    - derive/`/g/
    - derive/`/h/
    - derive/`/i/
    - derive/`/j/
    - derive/`/k/
    - derive/`/l/
    - derive/`/m/
    - derive/`/n/
    - derive/`/o/
    - derive/`/p/
    - derive/`/q/
    - derive/`/r/
    - derive/`/s/
    - derive/`/t/
    - derive/`/u/
    - derive/`/v/
    - derive/`/w/
    - derive/`/x/
    - derive/`/y/
    - derive/`/z/

translator:
  dictionary: shenma
  enable_charset_filter: false
  enable_encoder: false
  enable_sentence: false 
  encode_commit_history: false

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    punct: "^/.*$"
...
