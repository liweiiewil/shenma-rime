---
schema:
  schema_id: shenma
  name: 神码
  version: "1.0"
  author:
    - User
  description: |
    神码输入法自定义方案
dependencies:
  - punct

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator        # <--- 已修改为支持拼写运算的引擎
    - reverse_lookup_translator

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz/"   # <--- 允许输入万能键 /
  delimiter: " '"
  max_code_length: 4
  auto_select: true
  auto_select_pattern: "^[a-z/]{4}$"        # <--- 包含 / 的4码自动上屏
  auto_select_unique_candidate: true
  algebra:                                  # <--- 万能键的灵魂：自动派生带 / 的各种组合
    - 'derive/^([a-z])$/\//'
    - 'derive/^([a-z])([a-z])$/\/$2/'
    - 'derive/^([a-z])([a-z])$/$1\//'
    - 'derive/^([a-z])([a-z])([a-z])$/\/$2$3/'
    - 'derive/^([a-z])([a-z])([a-z])$/$1\/$3/'
    - 'derive/^([a-z])([a-z])([a-z])$/$1$2\//'
    - 'derive/^([a-z])([a-z])([a-z])([a-z])$/\/$2$3$4/'
    - 'derive/^([a-z])([a-z])([a-z])([a-z])$/$1\/$3$4/'
    - 'derive/^([a-z])([a-z])([a-z])([a-z])$/$1$2\/$4/'
    - 'derive/^([a-z])([a-z])([a-z])([a-z])$/$1$2$3\//'

translator:
  dictionary: shenma
  enable_charset_filter: false
  enable_encoder: false
  enable_sentence: false 
  encode_commit_history: false

recognizer:                                 # <--- 将符号快捷键从 / 挪走，给万能键让路
  import_preset: default
  patterns:
    punct: '^`([0-9]0?|[A-Za-z]+)$'
...
