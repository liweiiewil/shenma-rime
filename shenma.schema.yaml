---
schema:
  schema_id: shenma
  name: 沈码
  version: "1.1"
  author:
    - User
  description: |
    使用 ` 作为万能键，且仅显示4码匹配结果
dependencies:
  - punct

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator        # <--- 切回 table 引擎，解决显示“中、在”等碎片的问题
    - reverse_lookup_translator

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz`"  # <--- 将反引号加入可用字母表
  delimiter: " '"
  max_code_length: 4
  auto_select: true
  auto_select_pattern: "^[a-z`]{4}$"       # <--- 满4码（含万能键）自动上屏
  # 下面是核心：定义 ` 为万能键，匹配 a-z 任意字符
  algebra:
    - derive/a/`/
    - derive/b/`/
    - derive/c/`/
    - derive/d/`/
    - derive/e/`/
    - derive/f/`/
    - derive/g/`/
    - derive/h/`/
    - derive/i/`/
    - derive/j/`/
    - derive/k/`/
    - derive/l/`/
    - derive/m/`/
    - derive/n/`/
    - derive/o/`/
    - derive/p/`/
    - derive/q/`/
    - derive/r/`/
    - derive/s/`/
    - derive/t/`/
    - derive/u/`/
    - derive/v/`/
    - derive/w/`/
    - derive/x/`/
    - derive/y/`/
    - derive/z/`/

translator:
  dictionary: shenma
  enable_charset_filter: false
  enable_encoder: false
  enable_sentence: false 
  encode_commit_history: false
  enable_completion: true      # 输入不足4码时也显示以已输入编码开头的候选

punctuator:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    punct: "^/.*$"             # <--- 把原本占用 / 的功能移开，反之亦然
...
